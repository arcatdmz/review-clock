name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MINI_TOOL_DESIGN_SYSTEM_REPOSITORY: ${{ vars.MINI_TOOL_DESIGN_SYSTEM_REPOSITORY }}
      MINI_TOOL_DESIGN_SYSTEM_PAT: ${{ secrets.MINI_TOOL_DESIGN_SYSTEM_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout external design CSS source
        if: ${{ env.MINI_TOOL_DESIGN_SYSTEM_REPOSITORY != '' && env.MINI_TOOL_DESIGN_SYSTEM_PAT != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MINI_TOOL_DESIGN_SYSTEM_REPOSITORY }}
          token: ${{ env.MINI_TOOL_DESIGN_SYSTEM_PAT }}
          path: external-design-system

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build external design CSS source
        if: ${{ env.MINI_TOOL_DESIGN_SYSTEM_REPOSITORY != '' && env.MINI_TOOL_DESIGN_SYSTEM_PAT != '' }}
        run: npm --prefix external-design-system run build

      - name: Build
        env:
          MINI_TOOL_DESIGN_SYSTEM_DIST: ${{ github.workspace }}/external-design-system/dist
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
